##################################################
############     BED CONFIGURATION     ###########
##################################################
[heater_bed]
heater_pin: PA1
sensor_pin: PF4
sensor_type: EPCOS 100K B57560G104F
control: pid
pid_Kp:45.571 
pid_Ki:1.282 
pid_Kd:405.016
max_power: 0.95
pwm_cycle_time: 0.0166
min_temp: 0
max_temp: 150

[safe_z_home]
home_xy_position: 143, 120
speed: 800
z_hop: 10

#####################################################################
# 	Bed Mesh Calibrate
#####################################################################

[bed_mesh] 
speed: 500
horizontal_move_z: 1
mesh_min: 0, 30
mesh_max: 285, 270
probe_count: 15,15 #60,60
mesh_pps: 3,3 #2,2
algorithm: bicubic
bicubic_tension: 0.1
fade_start: 1
fade_end: 0
fade_target: 0
adaptive_margin: 5
#zero_reference_position: 143, 120 #285, 167 #

#####################################################################
# 	Bed Z Tilt
#####################################################################
[z_tilt] 
z_positions: #Nozzle to GE5C
  -80,  -20
  143, 355
  350, -20
points:
  5, 5 #15, 5
  5, 240  #15, 240
  285, 240  #275, 240
  285, 5 #275, 5
speed: 600
horizontal_move_z: 5
retries: 5
retry_tolerance: 0.08

#####################################################################
# 	Bed Screws Adjust
#####################################################################
[bed_screws]
screw1: 0,0 ## front left screw
screw2: 250,0 ## front right screw
screw3: 250,240 ## rear right screw
screw4: 0,240 ##rear left screw

[screws_tilt_adjust]
screw1: -5, 30
screw1_name: front left screw
screw2: 155, 30
screw2_name: front right screw
screw3: 155, 190
screw3_name: rear right screw
screw4: -5, 190
screw4_name: rear left screw
horizontal_move_z: 10.
speed: 50.
screw_thread: CW-M3

[gcode_macro PROBE_CALIBRATE]
gcode:
    CARTOGRAPHER_CALIBRATE

[gcode_macro DATA_SAMPLE]
gcode:
  G90
  SET_FAN_SPEED FAN=RSCS SPEED=1
  RESPOND TYPE=command MSG='Waiting for Coil to cool to 40'
