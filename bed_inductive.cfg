##################################################
############     BED CONFIGURATION     ###########
##################################################
[heater_bed]
heater_pin: PA1
sensor_pin: PF4
sensor_type: EPCOS 100K B57560G104F
control = pid
pid_kp = 45.637
pid_ki = 1.681
pid_kd = 309.759
min_temp: 0
max_temp: 150

#####################################################################
# 	Probe Pinda
#####################################################################
[safe_z_home]
home_xy_position: 125, 125
speed: 300
z_hop: 10
z_hop_speed: 25

[probe]
pin: ~!PC5
x_offset: 34.17
y_offset: 55.46
#z_offset: 0.650
speed: 10
samples: 3
sample_retract_dist: 5
lift_speed: 20
samples_result: median
samples_tolerance: 0.02
samples_tolerance_retries: 5

#####################################################################
# 	Bed Mesh Calibrate
#####################################################################
[bed_mesh]
speed: 300
horizontal_move_z: 5
mesh_min: 35,56
mesh_max: 280,280
mesh_pps: 3,3
probe_count: 5,5 ##Pinda
algorithm: bicubic
relative_reference_index: 7
bicubic_tension: 0.2
fade_start: 1
fade_end: 10
fade_target: 0
split_delta_z: .025
move_check_distance: 5

#####################################################################
# 	Bed Screws Adjust
#####################################################################
[bed_screws]
screw1: 20,0 ## front left screw
screw2: 280,0 ## front right screw
screw3: 280,285 ## rear right screw
screw4: 20,285 ##rear left screw

[screws_tilt_adjust]
screw1:   20, 0
screw1_name: front left screw
screw2: 280, 0
screw2_name: front center screw
screw3: 280, 285
screw3_name: front right screw
screw4:  20, 285
screw4_name: rear right screw
horizontal_move_z: 12
speed: 200.
screw_thread: CW-M3

#####################################################################
# 	Bed Z Tilt
#####################################################################
[z_tilt] 
z_positions: #Nozzle to GE5C
  -65,  -20
  143, 355
  350, -20
#points: #Probe can reach
#   10, 0
#  140, 192 
#  270, 0 
points:
  0, 0
  0, 210
  245, 210
  245, 0
speed: 400
horizontal_move_z: 15
retries: 30
retry_tolerance: 0.05
#retry_tolerance: 0.005
