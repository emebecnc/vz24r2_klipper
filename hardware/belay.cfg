[gcode_macro CARGAR_FILAMENTO]
gcode:
    G1 E450 F7200    ; Insertar 450 mm de filamento a 120 mm/s
    G1 E50 F1200     ; Insertar los últimos 50 mm de filamento a 20 mm/s

[gcode_macro DESCARGAR_FILAMENTO]
gcode:
    G1 E10 F{5*60}   ; Extruir 10 mm de filamento para ablandar la punta
    G0 E-5 F{60*60}  ; Retraer 5 mm para evitar atascos
    G0 E-50 F{5*60}  ; Retraer 50 mm lentamente para permitir enfriamiento
    G1 E-500 F6000   ; Retraer 500 mm de filamento rápidamente a 100 mm/s


