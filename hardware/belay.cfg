[belay my_belay]
extruder_type: extruder_stepper
extruder_stepper_name: my_extruder_stepper
sensor_pin: ^PG9
multiplier_high: 1.05
multiplier_low: 0.95
debug_level: 1

[extruder_stepper my_extruder_stepper]
extruder: extruder
step_pin: PE2
dir_pin: !PE3
enable_pin: !PD4
microsteps: 16
gear_ratio: 50:10 #Alu VzHextrudORT Emebe 
rotation_distance: 44.07 #22.035 #Alu VzHextrudORT Emebe #22.15
full_steps_per_rotation: 200

[tmc2209 extruder_stepper my_extruder_stepper]
uart_pin: PE1
run_current: 0.45
sense_resistor: 0.110
interpolate: False
driver_TBL: 1
driver_TOFF: 3 
driver_HSTRT: 0
driver_HEND: 3
