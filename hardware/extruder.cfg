#_____________________#### Extruder On Drive 2 ####_________________

[tmc2209 extruder]
uart_pin: PC6
run_current: 0.650
sense_resistor: 0.110
#hold_current: 0.100
stealthchop_threshold: 0
interpolate: False

[extruder]
step_pin: PF11
dir_pin: !PG3
enable_pin: !PG5
heater_pin: PA2 # HE0
sensor_pin:  PF3
microsteps: 16
# new_rd = previous_rd * mesured_distance / requested_distance
rotation_distance: 4.55 #VzHextrudORT 
full_steps_per_rotation: 200
nozzle_diameter: 0.400
filament_diameter: 1.750
sensor_type: ATC Semitec 104NT-4-R025H42G ##RAPIDO UHF
#sensor_type: Generic 3950 #Trianglelab NTC100K B3950 ##DRAGON HF
min_temp: 5
max_temp: 300
min_extrude_temp: 180
max_extrude_only_distance: 2000
max_extrude_cross_section: 9999
max_extrude_only_velocity: 120
max_extrude_only_accel: 10000
pressure_advance: 0.044
pressure_advance_smooth_time: 0.040 # 0.040
control = pid
pid_Kp=23.059 
pid_Ki=1.971 
pid_Kd=67.448

